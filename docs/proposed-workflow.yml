name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install optional deps
        run: pip install pyyaml

      - name: Make CLI executable
        run: chmod +x bin/os-yuanli-* tests/golden-path.sh

      - name: Doctor
        run: python3 bin/os-yuanli-doctor

      - name: Audit repo
        run: python3 bin/os-yuanli-audit

      - name: Golden-path integration test
        run: bash tests/golden-path.sh
